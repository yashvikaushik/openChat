<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenChat — Chat Room</title>
  <meta name="description" content="Engage in real-time conversations across public chat rooms.">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/chat.css">
</head>
<body>
  <div class="chat-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img class="app-logo" src="images/logo.png" alt="OpenChat Snail Logo">
        <span class="app-title">OpenChat</span>
      </div>

      <div class="sidebar-content">
        <div class="rooms-section">
          <h2 class="section-title">Rooms</h2>
          
          <nav class="rooms-list" id="rooms-list-container">
            <!-- Dynamically populated or static rooms -->
            <button class="room-nav-item active" data-room="General">
              <span class="room-prefix">#</span>
              <div class="room-details">
                <span class="room-nav-name">General</span>
                <span class="room-member-count">12 online</span>
              </div>
            </button>

            <button class="room-nav-item" data-room="JavaScript">
              <span class="room-prefix">#</span>
              <div class="room-details">
                <span class="room-nav-name">JavaScript</span>
                <span class="room-member-count">8 online</span>
              </div>
            </button>

            <button class="room-nav-item" data-room="Movies">
              <span class="room-prefix">#</span>
              <div class="room-details">
                <span class="room-nav-name">Movies</span>
                <span class="room-member-count">5 online</span>
              </div>
            </button>

            <button class="room-nav-item" data-room="Sports">
              <span class="room-prefix">#</span>
              <div class="room-details">
                <span class="room-nav-name">Sports</span>
                <span class="room-member-count">7 online</span>
              </div>
            </button>
          </nav>

          <button type="button" class="btn-create-room-sidebar" id="btn-create-room-trigger">
            <span class="plus-icon">+</span> Create New Room
          </button>
        </div>
      </div>

      <!-- User Profile (Bottom of Sidebar) -->
      <div class="user-profile-footer">
        <div class="user-avatar" id="current-user-avatar">??</div>
        <div class="user-info">
          <span class="user-name" id="current-user-name">Loading...</span>
          <span class="user-status"><span class="status-dot"></span> Online</span>
        </div>
      </div>
    </aside>

    <!-- Main Chat Window -->
    <main class="chat-main">
      <!-- Active Room Header -->
      <header class="chat-header">
        <div class="active-room-details">
          <h1 class="active-room-name" id="active-room-title"># General</h1>
          <p class="active-room-status" id="active-room-subtitle">12 members online</p>
        </div>
        
        <div class="header-actions">
          <button class="header-action-btn" title="View Members" aria-label="View members list">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span class="member-count-badge" id="header-member-count">12</span>
          </button>
          
          <button class="header-action-btn" title="Toggle Theme" aria-label="Toggle theme" id="btn-theme-toggle">
            🌓
          </button>

          <button class="header-action-btn" title="Mute Notifications" aria-label="Mute notifications" id="btn-mute">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
          </button>
          
          <button class="header-action-btn logout-btn" title="Leave Room" aria-label="Leave room" id="btn-leave">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
          </button>
        </div>
      </header>

      <!-- Scrollable Message Area -->
      <section class="messages-panel" id="messages-panel" aria-live="polite">
        <!-- Messages will be populated by JS -->
      </section>

      <!-- Message Input Area -->
      <footer class="chat-input-area">
        <form class="input-form" id="chat-form">
          <button type="button" class="input-action-btn" id="emoji-trigger" title="Add Emoji" aria-label="Add emoji">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
          </button>

          <div class="textarea-wrapper">
            <textarea 
              id="message-input" 
              placeholder="Type your message..." 
              rows="1" 
              required
              aria-label="Message content"
            ></textarea>
            <span class="input-hint">Press Enter to send</span>
          </div>

          <button type="button" class="input-action-btn" id="attach-trigger" title="Attach File" aria-label="Attach file">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-3.31 2.69-6 6-6s6 2.69 6 6v10c0 4.42-3.58 8-8 8s-8-3.58-8-8V6h2v9c0 3.31 2.69 6 6 6s6-2.69 6-6V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v11.5c0 1.1.9 2 2 2s2-.9 2-2V6h2z"/></svg>
          </button>

          <button type="submit" class="btn-send" id="btn-send-msg" title="Send Message" aria-label="Send message">
            <svg class="send-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </form>
      </footer>
    </main>
  </div>

  <!-- Create Room Dialog Modal (UI Only for Milestone 1) -->
  <dialog class="room-dialog" id="room-dialog">
    <div class="dialog-card">
      <h2>Create New Room</h2>
      <p>Enter a unique name for the new public chat room</p>
      
      <form id="dialog-create-form" method="dialog">
        <div class="form-group">
          <label for="dialog-room-name">Room Name</label>
          <input type="text" id="dialog-room-name" placeholder="e.g. tech, gaming, photography" required minlength="3" maxlength="30">
          <span class="field-hint">No spaces at start/end. 3–30 characters.</span>
        </div>
        
        <div class="dialog-actions">
          <button type="button" class="btn-secondary" id="btn-dialog-cancel">Cancel</button>
          <button type="submit" class="btn-primary" id="btn-dialog-submit">Create Room</button>
        </div>
      </form>
    </div>
  </dialog>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="js/common.js"></script>
  <script type="module" src="js/chat.js"></script>
</body>
</html>
